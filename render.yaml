services:
  - type: web
    name: ok-mairr-chronicle
    runtime: ruby
    plan: free
    buildCommand: bundle install
    startCommand: bundle exec ruby server.rb
    healthCheckPath: /
    envVars:
      - key: HOST
        value: "0.0.0.0"
      - key: ADMIN_PASSWORD
        generateValue: true
      - key: FORCE_SSL
        value: "1"
      - key: SESSION_HOURS
        value: "168"