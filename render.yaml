services:
  - type: web
    name: ok-mairr-chronicle
    runtime: ruby
    plan: starter
    buildCommand: bundle install
    startCommand: bundle exec ruby server.rb
    healthCheckPath: /
    disk:
      name: chronicle-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
    envVars:
      - key: HOST
        value: "0.0.0.0"
      - key: ADMIN_PASSWORD
        generateValue: true
      - key: FORCE_SSL
        value: "1"
      - key: SESSION_HOURS
        value: "168"