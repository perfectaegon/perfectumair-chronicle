<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Photograph · The ok.mairr Chronicle</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="photo-view-body">
    <div class="photo-view" id="photo-view">
      <header class="photo-view-header">
        <button class="photo-close" id="photo-close" type="button" aria-label="Go back">
          ← Back
        </button>
      </header>

      <main class="photo-page" id="photo-page">
        <p class="kicker">Photograph</p>
        <h1 class="photo-headline" id="photo-headline">Loading...</h1>
        <p class="photo-caption" id="photo-caption"></p>
        <p class="photo-byline" id="photo-byline"></p>

        <figure class="photo-frame">
          <img id="photo-image" alt="" />
        </figure>

        <div class="photo-actions">
          <a class="photo-download" id="photo-download" href="#" download>
            Download photograph
          </a>
          <a class="back-link" href="/">Return to front page</a>
        </div>
      </main>

      <div id="not-found" class="empty-edition hidden">
        <h2>Photograph not found</h2>
        <p>This image may have been removed from the archives.</p>
        <a class="back-link" href="/">← Return to front page</a>
      </div>
    </div>

    <script src="/photo.js"></script>
  </body>
</html>
